name: Convert Notebooks and Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install nbconvert jupyter
          # If your notebooks need to be *executed* before conversion,
          # also install their dependencies, e.g.:
          # pip install -r requirements.txt

      - name: Convert notebooks to HTML
        run: |
          mkdir -p _site
          # Convert every .ipynb in the repo, preserving directory structure
          find . -name "*.ipynb" -not -path "./_site/*" -not -path "*/.ipynb_checkpoints/*" | while read nb; do
            outdir="_site/$(dirname "$nb")"
            mkdir -p "$outdir"
            jupyter nbconvert --to html "$nb" --output-dir "$outdir"
          done

      - name: Generate index.html
        run: |
          cd _site
          {
            echo "<!DOCTYPE html><html><head><title>Notebooks</title></head><body>"
            echo "<h1>Notebooks</h1><ul>"
            find . -name "*.html" -not -name "index.html" | sort | while read f; do
              rel="${f#./}"
              echo "<li><a href=\"$rel\">$rel</a></li>"
            done
            echo "</ul></body></html>"
          } > index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4