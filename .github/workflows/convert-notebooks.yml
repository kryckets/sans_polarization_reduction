name: Convert notebooks for GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install nbconvert
        run: |
          python -m pip install --upgrade pip
          python -m pip install nbconvert

      - name: Convert notebooks to HTML
        run: |
          python -m nbconvert --to html docs/*.ipynb --output-dir docs

      - name: Commit generated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/*.html
          if ! git diff --quiet --cached; then
            git commit -m "Build docs: convert notebooks to HTML"
            git push
          else
            echo "No generated HTML changes to commit."
          fi
